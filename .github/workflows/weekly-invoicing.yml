name: Weekly AFIP Invoice Processing

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  process-afip-invoices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create directories
        run: mkdir -p certificates

      - name: Decode AFIP certificates
        env:
          AFIP_CERT_B64: ${{ secrets.AFIP_CERT_B64 }}
          AFIP_KEY_B64: ${{ secrets.AFIP_KEY_B64 }}
        run: |
          echo "$AFIP_CERT_B64" | base64 -d > certificates/cert.crt
          echo "$AFIP_KEY_B64" | base64 -d > certificates/private.key

      - name: Create .env file
        env:
          AFIP_CUIT: ${{ secrets.AFIP_CUIT }}
          AFIP_ENVIRONMENT: ${{ secrets.AFIP_ENVIRONMENT }}
          AFIP_PTOVTA: ${{ secrets.AFIP_PTOVTA }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          cat > .env << EOF
          AFIP_CUIT=$AFIP_CUIT
          AFIP_ENVIRONMENT=$AFIP_ENVIRONMENT
          AFIP_PTOVTA=$AFIP_PTOVTA
          AFIP_CERT_PATH=./certificates/cert.crt
          AFIP_KEY_PATH=./certificates/private.key
          AZURE_STORAGE_CONNECTION_STRING=$AZURE_STORAGE_CONNECTION_STRING
          LOG_LEVEL=info
          EOF

      - name: Process pending orders to AFIP invoices
        id: run_process
        run: npm run process:auto 2>&1 | tee run-output.txt

      - name: Write job summary
        if: always()
        run: |
          echo "## Weekly AFIP Processing — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat run-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
