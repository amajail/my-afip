name: Deploy Azure Function

on:
  push:
    branches: [main]
    paths:
      - 'src/functions/**'
      - 'src/database/AzureTableDatabase.js'
      - 'host.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Diagnose function app
        run: |
          echo "=== Function App Config ==="
          az functionapp show \
            --name my-afip-func \
            --resource-group my-afip-rg \
            --query "{state:state, linuxFxVersion:siteConfig.linuxFxVersion, nodeVersion:siteConfig.nodeVersion}" \
            -o json

      - name: Ensure Node 20 runtime
        run: |
          az functionapp config set \
            --name my-afip-func \
            --resource-group my-afip-rg \
            --linux-fx-version "Node|20"

      - name: Configure app settings
        run: |
          az functionapp config appsettings set \
            --name my-afip-func \
            --resource-group my-afip-rg \
            --settings \
              "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "AzureWebJobsFeatureFlags=EnableWorkerIndexing" \
              "FUNCTIONS_WORKER_RUNTIME=node" \
              "WEBSITE_NODE_DEFAULT_VERSION=~20"

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "dashboard/*" \
            --exclude "tests/*" \
            --exclude "docs/*" \
            --exclude "scripts/*" \
            --exclude "orders/*" \
            --exclude "*.env*" \
            --exclude "certificates/*"
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"
          echo "Key files in zip:"
          unzip -l deploy.zip | grep -E "host\.json|package\.json|src/functions"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: my-afip-func
          package: deploy.zip
